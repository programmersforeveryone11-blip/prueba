<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva pestaña - Google Chrome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col h-screen w-screen bg-white">

    <div class="flex-1 flex flex-col overflow-hidden bg-white">

        <div class="chrome-header pt-2 px-2 flex flex-col border-b border-gray-300 shrink-0">
            <div class="flex items-center justify-between h-9">
                <div class="flex items-end h-full space-x-1" id="tab-bar">
                    <div id="tab-google" onclick="switchTab('google')" class="tab-item tab-active">
                        <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24"><path fill="#4285F4" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
                        <span class="truncate pr-4">Nueva pestaña</span>
                    </div>

                    <div id="tab-luizabeth" onclick="switchTab('luizabeth')" class="tab-item tab-inactive hidden">
                        <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24"><path fill="#EA4335" d="M12 2L1 21h22L12 2z"/></svg>
                        <span class="truncate pr-4">Luizabeth Studios</span>
                        <button class="absolute right-2 p-0.5 rounded-full hover:bg-gray-200">✕</button>
                    </div>

                    <button class="mb-1 p-1 rounded-full hover:bg-gray-300 text-gray-600 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                    </button>
                </div>
            </div>

            <div class="flex items-center space-x-2 py-1.5 bg-white px-2">
                <div class="flex items-center space-x-1">
                    <button class="p-1.5 rounded-full text-gray-400"><svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
                    <button class="p-1.5 rounded-full text-gray-600" onclick="location.reload()"><svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M9 11l3-3-3-3"/></svg></button>
                </div>
                <div class="flex-1 flex items-center chrome-address-bar rounded-full h-7 px-3 text-sm text-gray-700 space-x-2">
                    <svg class="w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="chrome-url-input" value="google.com" class="bg-transparent w-full focus:outline-none text-xs">
                </div>
                <button class="w-7 h-7 rounded-full bg-purple-600 text-white flex items-center justify-center font-semibold text-xs">L</button>
            </div>
        </div>

        <div id="content-wrapper" class="flex-1 flex flex-col relative">
            <div id="google-view" class="flex-1 flex flex-col items-center justify-center px-4 pb-24">
                <div class="mb-7"><span class="text-7xl font-semibold tracking-tight brand-gradient">Luizabeth</span></div>
                <div class="w-full max-w-[584px] search-container-style flex items-center bg-white border border-[#dfe1e5] h-[46px] rounded-full px-4 transition-all">
                    <svg class="w-5 h-5 text-gray-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="google-search-input" class="w-full h-full bg-transparent outline-none text-base" placeholder="Busca 'luizabeth'" autofocus>
                    <button id="voice-btn" class="p-1 hover:bg-gray-100 rounded-full ml-2" title="Buscar por voz">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path fill="#34A853" d="M12 17c2.76 0 5-2.24 5-5h-2c0 1.66-1.34 3-3 3s-3-1.34-3-3H5c0 2.76 2.24 5 5 5v3h2v-3z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="portfolio-view" class="hidden w-full h-full">
                <iframe src="luizabeth.html" class="w-full h-full border-none"></iframe>
            </div>
        </div>
    </div>

    <div id="search-toast" class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-4 py-2 rounded-lg text-sm">
        Buscando: <span id="toast-term" class="font-bold text-sky-400"></span>...
    </div>

    <script src="script.js"></script>
</body>
</html>
